actions:
  asyncapiPath: null
  apisYmlUpdated: true
  reason: |
    No WebSocket protocol surface exists on Freightos's own public API. The
    documented developer APIs (Shipping Calculator, Freight Rate Estimator,
    Duties, CO2) are request/response HTTP, and the booking/tracking surfaces
    are partner-gated HTTP integrations delivered into TMS/ERP systems - not a
    documented public server-push transport. No AsyncAPI document was created
    because there is no public streaming transport on Freightos's own API to
    model.
