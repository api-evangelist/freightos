apis:
- aid: freightos:freightos-shipping-calculator-api
  name: Freightos Shipping Calculator API
  tags:
  - Rates
  - Quotes
  - Estimates
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://ship.freightos.com/api/shippingCalculator
  baseURL: https://ship.freightos.com/api
  properties:
  - url: https://developer.freightos.com/apis
    type: Documentation
  - url: https://ship.freightos.com/api/shippingCalculator
    type: APIReference
  description: >-
    Public marketplace quote endpoint returning freight price ranges (min/max),
    transit-time ranges, and shipping mode (air, LCL, FCL, trucking) for a given
    origin, destination, weight, and load type. Supports GET with URL parameters
    or POST for richer requests, and JSON or XML responses. Public marketplace
    rates require no key (subject to attribution terms); private Custom Site
    rates use an API key parameter. Documented as beta / provided as-is.
- aid: freightos:freightos-freight-rate-estimator-api
  name: Freightos Freight Rate Estimator API
  tags:
  - Estimates
  - Rates
  - Freight
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://developers.freightos.com/docs/freightos---freight-estimator/1/overview
  properties:
  - url: https://developers.freightos.com/docs/freightos---freight-estimator/1/overview
    type: Documentation
  - url: https://developers.freightos.com/docs/freightos---freight-estimator/1/routes/freightEstimates/post
    type: APIReference
  description: >-
    Developer-portal JSON API that returns instant freight estimates for air,
    ocean, and trucking across core global import/export lanes, drawn from
    Freightos Marketplace live rates and a large historical rate database. The
    documented route is a POST that accepts origin, destination, and load
    definition and returns estimated cost and transit-time ranges per leg.
    Endpoints modeled from portal docs; access is provisioned per developer/
    partner.
- aid: freightos:freightos-duties-api
  name: Freightos Duties API
  tags:
  - Duties
  - HS Codes
  - Classification
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://developers.freightos.com/apis
  properties:
  - url: https://developers.freightos.com/apis
    type: Documentation
  description: >-
    HS-code classification API that takes a free-text commodity description and
    returns a ranked list of matching Harmonized System (HS) codes with match
    probabilities and descriptions, supporting duty estimation for US and
    international import/export. Documented on the developer portal as a beta
    API; endpoints modeled.
- aid: freightos:freightos-co2-calculation-api
  name: Freightos CO2 Calculation API
  tags:
  - CO2
  - Emissions
  - Sustainability
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://developers.freightos.com/docs/internalutility/1/overview
  properties:
  - url: https://developers.freightos.com/docs/internalutility/1/overview
    type: Documentation
  description: >-
    Emissions API returning EU-standard CO2 estimates across air, ocean, and
    trucking modes for a shipment leg or route, for carbon reporting and greener
    routing decisions. Documented on the developer portal as a beta utility API;
    endpoints modeled.
- aid: freightos:freightos-webcargo-booking-api
  name: WebCargo Booking API
  tags:
  - Booking
  - eBooking
  - Air Cargo
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://www.webcargo.co/
  properties:
  - url: https://developer.freightos.com/getting-started-freightos-integrations
    type: Documentation
  description: >-
    Partner-gated booking surface behind WebCargo by Freightos, giving freight
    forwarders and carriers live, bookable air/ocean capacity and real-time
    eBooking across 55+ carriers (Lufthansa, Air France KLM, IAG Cargo, United,
    and others), plus booking status updates. Exposed to forwarder, carrier, and
    TMS/ERP partners under commercial agreements rather than open self-service.
    Endpoints modeled - not publicly documented in full.
- aid: freightos:freightos-shipment-tracking-api
  name: Freightos Shipment Management and Tracking API
  tags:
  - Shipments
  - Tracking
  - Documents
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://developer.freightos.com/getting-started-freightos-integrations
  properties:
  - url: https://developer.freightos.com/getting-started-freightos-integrations
    type: Documentation
  description: >-
    Partner-gated shipment lifecycle surface for managing shipments across
    providers - documentation management, messaging, milestone tracking, and
    shipment status updates - typically integrated into a forwarder or shipper
    TMS/ERP. Endpoints modeled - provisioned per partner and not publicly
    documented in full.
