aid: freightos
url: https://raw.githubusercontent.com/api-evangelist/freightos/refs/heads/main/apis.yml
name: Freightos
kind: company
description: >-
  Freightos (NASDAQ CRGO) operates a global freight booking marketplace and,
  through WebCargo by Freightos, a rate-management and eBooking platform used by
  freight forwarders and carriers to price and book air, ocean, and trucking
  shipments in real time across 55+ carriers. Freightos publishes a developer
  portal (developers.freightos.com / developer.freightos.com) with freight-rate
  estimation, HS-code duties classification, and CO2 emissions APIs, plus the
  public Shipping Calculator on the marketplace. Bookable live rates, eBooking,
  and shipment tracking are offered to forwarder, carrier, and TMS/ERP partners
  under commercial agreements. Most developer-portal APIs are documented as beta
  and provided as-is, and full access is provisioned per partner rather than via
  open self-service signup.
