description: >-
  FinOps view of Freightos spend. Freightos does not bill its APIs on a posted
  per-call rate card. Public Shipping Calculator price-range data is free with
  attribution. Developer-portal APIs (Estimator, Duties, CO2) are beta and
  provisioned per developer. The material commercial cost is on the transaction
  and subscription side - freight bookings on the Freightos Marketplace and
  WebCargo/SaaS subscriptions for forwarders and carriers - rather than a metered
  API fee. Cost management here is mostly about the freight/booking spend that
  flows through the integration, plus any negotiated partner platform fees.
notes: >-
  Per-unit API rates are not published and are not reconciled here. Freightos is
  a public company (NASDAQ CRGO); confirm marketplace transaction fees and
  WebCargo subscription terms directly during reconciliation.
