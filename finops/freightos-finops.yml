meters:
- name: freight_bookings
  description: Freight shipments booked through the Freightos Marketplace or WebCargo eBooking; billed as freight/transaction spend, not an API fee.
  unit: bookings
  aggregation: sum
  dimensions:
  - account
  - mode
  - lane
- name: estimate_requests
  description: Freight estimate/quote requests via the Shipping Calculator or Estimator API; no posted per-call charge.
  unit: requests
  aggregation: sum
  dimensions:
  - account
- name: platform_subscription
  description: WebCargo/SaaS subscription and any negotiated partner platform fees for booking and tracking access.
  unit: months
  aggregation: sum
  dimensions:
  - account
principles:
- name: Visibility
  description: Track freight/booking spend and estimate-request volume per lane and mode flowing through the integration.
- name: Allocation
  description: Map bookings and platform subscription fees to internal cost centers, shippers, or business units.
- name: Optimization
  description: Use estimate and CO2 APIs to compare modes and lanes before booking; consolidate to negotiated carrier/partner terms.
- name: Accountability
  description: Assign an owner for the Freightos/WebCargo relationship and review monthly freight spend against budget and partner terms.
